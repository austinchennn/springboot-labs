# application.yml — 公共配置
# Lab 0 已经把数据库和 H2 控制台配好了，直接可以运行
spring:
  application:
    name: bookshelf

  # H2 内存数据库配置
  datasource:
    url: jdbc:h2:mem:bookshelfdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop   # 启动时建表，停止时删表（开发环境用）
    show-sql: true             # 控制台打印 SQL 语句，方便调试

  # TODO(Lab4): 加上 sql.init.mode: always，让 src/main/resources/data.sql 在启动时自动执行
  # sql:
  #   init:
  #     mode: always

  # TODO(Lab8): 加上 profiles.active: dev，并创建 application-dev.yml / application-prod.yml
  # profiles:
  #   active: dev

  # H2 控制台（浏览器可视化数据库，开发用）
  h2:
    console:
      enabled: true
      path: /h2-console

# 服务器配置
server:
  port: 8080

